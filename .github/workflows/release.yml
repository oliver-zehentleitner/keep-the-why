name: GH Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package skill
        run: |
          cd skills/keep-the-why
          zip -r "${GITHUB_WORKSPACE}/keep-the-why-skill.zip" .

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release create "$TAG" keep-the-why-skill.zip \
            --title "$TAG" \
            --generate-notes
